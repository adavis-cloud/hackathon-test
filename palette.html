<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Palette Generator</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --card: #1a1a22;
      --text: #e8e8f0;
      --muted: #666680;
      --radius: 20px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow-x: hidden;
    }

    /* ── Password gate ── */
    #gate {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      transition: opacity 0.4s, visibility 0.4s;
    }

    #gate.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .gate-box {
      background: var(--card);
      border: 1px solid #2a2a36;
      border-radius: var(--radius);
      padding: 2.4rem 2rem;
      width: min(340px, calc(100vw - 2rem));
      display: flex;
      flex-direction: column;
      gap: 0;
      box-shadow: 0 30px 70px rgba(0,0,0,0.5);
    }

    .gate-title {
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      text-align: center;
      margin-bottom: 0.3rem;
    }

    .gate-subtitle {
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
      margin-bottom: 1.6rem;
    }

    .gate-input {
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      color: var(--text);
      background: #0f0f13;
      border: 1px solid #2a2a36;
      border-radius: 12px;
      padding: 0.75rem 1rem;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
      margin-bottom: 0.6rem;
    }

    .gate-input:focus { border-color: #55556a; }

    .gate-input.error { border-color: #c0485a; animation: shake 0.35s ease; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-6px); }
      60%      { transform: translateX(6px); }
    }

    .gate-error {
      font-size: 0.78rem;
      color: #c0485a;
      text-align: center;
      height: 1.1em;
      margin-bottom: 1rem;
    }

    .gate-btn {
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      color: #0f0f13;
      background: #fff;
      border: none;
      border-radius: 50px;
      padding: 0.75rem;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(255,255,255,0.1);
    }

    .gate-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(255,255,255,0.18); }
    .gate-btn:active { transform: translateY(1px); }

    .page-header {
      text-align: center;
      margin-bottom: 0.6rem;
    }

    h1 {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 0.2rem;
      background: linear-gradient(135deg, #ff6b6b, #feca57 35%, #48dbfb 70%, #ff9ff3);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .byline {
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 2.5rem;
      font-weight: 300;
    }

    .palette {
      display: flex;
      gap: 0;
      width: min(860px, 100%);
      height: 340px;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 40px 80px rgba(0,0,0,0.6);
      margin-bottom: 2rem;
    }

    .swatch {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 1rem 0.8rem;
      cursor: pointer;
      position: relative;
      transition: flex 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      overflow: hidden;
    }

    .swatch::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0);
      transition: background 0.2s;
    }

    .swatch:hover {
      flex: 1.7;
    }

    .swatch:hover::after {
      background: rgba(0,0,0,0.12);
    }

    .swatch-info {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.2s, transform 0.2s;
    }

    .swatch:hover .swatch-info {
      opacity: 1;
      transform: translateY(0);
    }

    .hex-code {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.3rem 0.7rem;
      border-radius: 30px;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(6px);
      white-space: nowrap;
    }

    .copy-hint {
      font-size: 0.65rem;
      font-weight: 400;
      letter-spacing: 0.05em;
      opacity: 0.7;
      color: #fff;
    }

    .copied-toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #fff;
      color: #0f0f13;
      padding: 0.6rem 1.4rem;
      border-radius: 30px;
      font-size: 0.85rem;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 100;
      letter-spacing: 0.02em;
    }

    .copied-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    button#generate {
      position: relative;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #0f0f13;
      background: #fff;
      border: none;
      border-radius: 50px;
      padding: 0.85rem 2.4rem;
      cursor: pointer;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(255,255,255,0.15);
    }

    button#generate::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #f0f0f0, #fff);
      opacity: 0;
      transition: opacity 0.2s;
    }

    button#generate:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(255,255,255,0.25);
    }

    button#generate:active {
      transform: translateY(1px);
    }

    .btn-label { position: relative; z-index: 1; }

    .scheme-picker {
      display: flex;
      gap: 0.5rem;
    }

    .scheme-btn {
      font-family: 'Inter', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--muted);
      background: var(--card);
      border: 1px solid #2a2a36;
      border-radius: 20px;
      padding: 0.4rem 0.9rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }

    .scheme-btn:hover, .scheme-btn.active {
      color: var(--text);
      border-color: #55556a;
      background: #22222e;
    }

    .scheme-btn.active {
      border-color: rgba(255,255,255,0.3);
    }

    @keyframes popIn {
      0%   { transform: scale(0.94); opacity: 0; }
      60%  { transform: scale(1.01); }
      100% { transform: scale(1);    opacity: 1; }
    }

    .palette.animate {
      animation: popIn 0.4s cubic-bezier(0.34, 1.4, 0.64, 1) forwards;
    }
  </style>
</head>
<body>

  <!-- Password gate -->
  <div id="gate">
    <div class="gate-box">
      <div>
        <p class="gate-title">✦ Palette Generator</p>
        <p class="gate-subtitle">Enter the password to continue</p>
      </div>
      <input class="gate-input" id="gateInput" type="password" placeholder="Password" autocomplete="current-password" />
      <p class="gate-error" id="gateError">&nbsp;</p>
      <button class="gate-btn" id="gateBtn">Unlock</button>
    </div>
  </div>

  <header class="page-header">
    <h1>🎨 Hue&apos;s Feeling Lucky?</h1>
    <p class="byline">by Arick</p>
  </header>
  <p class="subtitle">Click a color to copy its hex code</p>

  <div class="palette" id="palette"></div>

  <div class="controls">
    <button id="generate"><span class="btn-label">✦ Generate Palette</span></button>
    <div class="scheme-picker" id="schemePicker"></div>
  </div>

  <div class="copied-toast" id="toast"></div>

  <script>
    const schemes = {
      random:      { label: 'Random',      fn: randomPalette },
      analogous:   { label: 'Analogous',   fn: analogousPalette },
      complementary: { label: 'Complementary', fn: complementaryPalette },
      triadic:     { label: 'Triadic',     fn: triadicPalette },
      monochrome:  { label: 'Monochrome',  fn: monochromePalette },
    };

    let activeScheme = 'random';

    function hslToHex(h, s, l) {
      s /= 100; l /= 100;
      const a = s * Math.min(l, 1 - l);
      const f = n => {
        const k = (n + h / 30) % 12;
        const c = l - a * Math.max(-1, Math.min(k - 3, 9 - k, 1));
        return Math.round(255 * c).toString(16).padStart(2, '0');
      };
      return `#${f(0)}${f(8)}${f(4)}`.toUpperCase();
    }

    function rand(min, max) { return Math.random() * (max - min) + min; }
    function randInt(min, max) { return Math.floor(rand(min, max + 1)); }

    function randomPalette() {
      return Array.from({ length: 5 }, () =>
        hslToHex(randInt(0, 359), randInt(40, 90), randInt(35, 70))
      );
    }

    function analogousPalette() {
      const base = randInt(0, 359);
      const s = randInt(50, 80), l = randInt(40, 65);
      return [-40, -20, 0, 20, 40].map(offset =>
        hslToHex((base + offset + 360) % 360, s + randInt(-5,5), l + randInt(-8,8))
      );
    }

    function complementaryPalette() {
      const base = randInt(0, 359);
      const comp = (base + 180) % 360;
      return [
        hslToHex(base, randInt(60,80), randInt(55,70)),
        hslToHex(base, randInt(50,70), randInt(40,55)),
        hslToHex(base, randInt(30,50), randInt(70,82)),
        hslToHex(comp, randInt(60,80), randInt(55,70)),
        hslToHex(comp, randInt(50,70), randInt(40,55)),
      ];
    }

    function triadicPalette() {
      const base = randInt(0, 359);
      const hues = [base, (base+120)%360, (base+240)%360];
      const colors = [];
      hues.forEach(h => {
        colors.push(hslToHex(h, randInt(55,80), randInt(50,65)));
        if (colors.length < 5) colors.push(hslToHex(h, randInt(40,60), randInt(65,78)));
      });
      return colors.slice(0, 5);
    }

    function monochromePalette() {
      const h = randInt(0, 359), s = randInt(45, 75);
      return [20, 35, 50, 65, 78].map(l => hslToHex(h, s, l));
    }

    function getLuminance(hex) {
      const r = parseInt(hex.slice(1,3),16)/255;
      const g = parseInt(hex.slice(3,5),16)/255;
      const b = parseInt(hex.slice(5,7),16)/255;
      return 0.299*r + 0.587*g + 0.114*b;
    }

    function render(colors) {
      const palette = document.getElementById('palette');
      palette.classList.remove('animate');
      void palette.offsetWidth;
      palette.classList.add('animate');
      palette.innerHTML = '';

      colors.forEach(hex => {
        const swatch = document.createElement('div');
        swatch.className = 'swatch';
        swatch.style.background = hex;

        const light = getLuminance(hex) > 0.5;
        const textColor = light ? 'rgba(0,0,0,0.85)' : 'rgba(255,255,255,0.95)';

        swatch.innerHTML = `
          <div class="swatch-info">
            <span class="hex-code" style="color:${textColor}">${hex}</span>
            <span class="copy-hint" style="color:${textColor}">click to copy</span>
          </div>`;

        swatch.addEventListener('click', () => copyColor(hex));
        palette.appendChild(swatch);
      });
    }

    let toastTimer;
    function copyColor(hex) {
      navigator.clipboard.writeText(hex).then(() => {
        const toast = document.getElementById('toast');
        toast.textContent = `Copied ${hex}`;
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
      });
    }

    function generate() {
      const colors = schemes[activeScheme].fn();
      render(colors);
    }

    // Build scheme buttons
    const picker = document.getElementById('schemePicker');
    Object.entries(schemes).forEach(([key, { label }]) => {
      const btn = document.createElement('button');
      btn.className = 'scheme-btn' + (key === activeScheme ? ' active' : '');
      btn.textContent = label;
      btn.addEventListener('click', () => {
        activeScheme = key;
        document.querySelectorAll('.scheme-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        generate();
      });
      picker.appendChild(btn);
    });

    document.getElementById('generate').addEventListener('click', generate);

    // Spacebar shortcut
    document.addEventListener('keydown', e => {
      if (e.code === 'Space' && e.target === document.body) { e.preventDefault(); generate(); }
    });

    generate();

    // ── Password gate ──
    const CORRECT = 'preview2026';
    const STORAGE_KEY = 'palette_unlocked';
    const gate = document.getElementById('gate');
    const gateInput = document.getElementById('gateInput');
    const gateBtn = document.getElementById('gateBtn');
    const gateError = document.getElementById('gateError');

    function store(key, val) { try { localStorage.setItem(key, val); } catch(e) {} }
    function retrieve(key)   { try { return localStorage.getItem(key); } catch(e) { return null; } }

    function unlock() {
      gate.classList.add('hidden');
    }

    function tryPassword() {
      if (gateInput.value === CORRECT) {
        store(STORAGE_KEY, '1');
        unlock();
      } else {
        gateError.textContent = 'Incorrect password — try again.';
        gateInput.classList.add('error');
        gateInput.value = '';
        setTimeout(() => gateInput.classList.remove('error'), 400);
        gateInput.focus();
      }
    }

    if (retrieve(STORAGE_KEY) === '1') {
      unlock();
    }

    gateBtn.addEventListener('click', tryPassword);
    gateInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryPassword(); });
    gateInput.focus();
  </script>
</body>
</html>
